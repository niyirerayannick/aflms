{% extends "transport/driver_base.html" %}

{% block title %}Request Fuel | TMS{% endblock %}

{% block driver_content %}
<section data-section="fuel" class="max-w-lg mx-auto">
<div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-200">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Request Fuel</h1>
    <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label for="{{ form.trip.id_for_label }}" class="block text-sm font-medium text-gray-700">Trip</label>
                {{ form.trip }}
            </div>
            <div>
                <label for="{{ form.station.id_for_label }}" class="block text-sm font-medium text-gray-700">Fuel Station</label>
                {{ form.station }}
            </div>
            <div>
                <label for="{{ form.amount.id_for_label }}" class="block text-sm font-medium text-gray-700">Amount</label>
                {{ form.amount }}
            </div>
            <div>
                <label for="{{ form.notes.id_for_label }}" class="block text-sm font-medium text-gray-700">Notes</label>
                {{ form.notes }}
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                Submit Request
            </button>
        </div>
    </form>
</div>
</section>
{% endblock %}
