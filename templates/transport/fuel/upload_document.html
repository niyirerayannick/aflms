{% extends "transport/driver_base.html" %}

{% block title %}Upload Fuel Document | TMS{% endblock %}

{% block driver_content %}
<section data-section="fuel" class="max-w-lg mx-auto">
<div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-200">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Upload Fuel Document for {{ fuel_request }}</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label for="{{ form.document.id_for_label }}" class="block text-sm font-medium text-gray-700">Document</label>
                {{ form.document }}
            </div>
        </div>
        <div class="mt-6">
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition-colors">
                Upload Document
            </button>
        </div>
    </form>
</div>
</section>
{% endblock %}
