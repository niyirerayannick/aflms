<header class="h-16 bg-white border-b border-slate-200 px-4 sm:px-6 lg:px-8 flex items-center justify-between">
    <div class="flex items-center gap-3">
        <button type="button" class="lg:hidden p-2 rounded-md text-slate-600 hover:bg-slate-100" onclick="toggleSidebar(true)">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        </button>
        <h1 class="text-lg font-semibold text-slate-800">Afrilott Transport Management System</h1>
    </div>

    <div class="flex items-center gap-4">
        <button type="button" class="relative p-2 rounded-md text-slate-600 hover:bg-slate-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9a6 6 0 1 0-12 0v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/></svg>
            <span class="absolute top-1 right-1 block h-2 w-2 rounded-full bg-red-600"></span>
        </button>

        <span class="hidden sm:inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold bg-blue-100 text-blue-800">{{ request.user.role|title }}</span>

        <a href="{% url 'accounts:profile' %}" class="flex items-center gap-2">
            {% if request.user.profile_photo %}
                <img src="{{ request.user.profile_photo.url }}" alt="Avatar" class="h-9 w-9 rounded-full object-cover border border-slate-200">
            {% else %}
                <div class="h-9 w-9 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-semibold">{{ request.user.full_name|slice:":1"|upper }}</div>
            {% endif %}
            <span class="hidden md:block text-sm font-medium text-slate-700">{{ request.user.full_name }}</span>
        </a>

        <a href="{% url 'accounts:logout' %}" class="inline-flex items-center rounded-lg bg-slate-900 px-3 py-2 text-sm font-semibold text-white hover:bg-slate-700">Logout</a>
    </div>
</header>
