<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ATMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/frontend.css' %}">
    <script src="{% static 'js/frontend.js' %}" defer></script>
</head>
<body class="min-h-screen relative overflow-hidden" style="font-family: 'Inter', sans-serif;">
    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://plus.unsplash.com/premium_photo-1661963219843-f1a50a6cfcd3?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');"></div>
    <div class="absolute inset-0 bg-green-900/80"></div>

    <div class="spa-content">
        <div class="relative min-h-screen flex items-center justify-center p-4">
            <div class="w-full sm:max-w-xl rounded-2xl border border-green-300/25 bg-green-900/90 shadow-2xl backdrop-blur-sm overflow-hidden mx-2">
                <div class="px-6 sm:px-8 pt-8 pb-6">
                    <div class="mx-auto flex items-center justify-center h-20 sm:h-28">
                        <img src="{% static 'img/Afrilott.png' %}" alt="AFRILOTT Logo" class="h-16 sm:h-28 max-w-full object-contain" style="filter:brightness(0) invert(1);">
                    </div>
                    <h1 class="mt-5 text-center text-2xl sm:text-4xl font-bold text-white">Sign in to ATMS</h1>
                    <p class="mt-2 text-center text-sm sm:text-base text-green-100">Secure access for fleet professionals</p>

                    <div class="mt-6 border-t border-green-200/20"></div>

                    {% if form.non_field_errors %}
                        <div class="mt-5 rounded-lg bg-green-500/15 border border-green-300/30 px-4 py-3 text-sm text-green-100">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}

                    <form method="post" class="mt-6 space-y-5">
                        {% csrf_token %}
                        <div>
                            <label for="id_email" class="block text-sm font-semibold text-white">Email</label>
                            <div class="mt-2 relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 9v.906a2.25 2.25 0 0 1-1.183 1.981l-6.75 3.75a2.25 2.25 0 0 1-2.134 0l-6.75-3.75A2.25 2.25 0 0 1 3.75 9.906V9m18 0V7.5A2.25 2.25 0 0 0 19.5 5.25h-15A2.25 2.25 0 0 0 2.25 7.5V9m19.5 0-8.598 4.776a2.25 2.25 0 0 1-2.304 0L2.25 9"/></svg>
                                </span>
                                <input type="email" name="email" id="id_email" value="{{ form.email.value|default:'' }}" placeholder="name@company.com" required class="w-full rounded-lg border border-white/25 bg-white/95 pl-11 pr-3 py-3 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-300">
                            </div>
                        </div>

                        <div>
                            <label for="id_password" class="block text-sm font-semibold text-white">Password</label>
                            <div class="mt-2 relative">
                                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 0h10.5A2.25 2.25 0 0 1 19.5 12.75v6A2.25 2.25 0 0 1 17.25 21h-10.5A2.25 2.25 0 0 1 4.5 18.75v-6A2.25 2.25 0 0 1 6.75 10.5Z"/></svg>
                                </span>
                                <input type="password" name="password" id="id_password" placeholder="••••••••" required class="w-full rounded-lg border border-white/25 bg-white/95 pl-11 pr-3 py-3 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-green-300 focus:border-green-300">
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <label class="inline-flex items-center gap-2 text-sm text-white">
                                <input type="checkbox" name="remember_me" class="h-4 w-4 rounded border-white/40 text-green-500 focus:ring-green-300">
                                Remember me
                            </label>
                            <a href="/password/reset/" class="text-sm text-green-300 hover:text-green-200" data-spa>Forgot password?</a>
                        </div>

                        <button type="submit" class="w-full rounded-lg bg-green-600 py-3 text-lg font-semibold text-white hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-300">Sign in</button>
                    </form>
                </div>

                <div class="bg-green-950/70 px-8 py-4 text-center border-t border-green-200/20">
                    <p class="text-xs text-green-100">ATMS v1.0 © AFRILOTT Transport Management System</p>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/accounts_spa.js' %}"></script>
</body>
</html>
