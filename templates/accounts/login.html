<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AFLMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/frontend.css' %}">
    <script src="{% static 'js/frontend.js' %}" defer></script>
</head>
<body class="min-h-screen relative overflow-hidden" style="font-family: 'Inter', sans-serif;">
    <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?auto=format&fit=crop&w=1920&q=80');"></div>
    <div class="absolute inset-0 bg-slate-900/65"></div>

    <div class="relative min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-xl rounded-2xl border border-rose-300/25 bg-rose-900/90 shadow-2xl backdrop-blur-sm overflow-hidden">
            <div class="px-8 pt-8 pb-6">
                <div class="mx-auto h-14 w-14 rounded-full border border-white/40 bg-white/10 flex items-center justify-center text-white font-bold text-lg">ASF</div>
                <h1 class="mt-5 text-center text-4xl font-bold text-white">Sign in to ASFMS</h1>
                <p class="mt-2 text-center text-sm text-rose-100">Secure access for fleet professionals</p>

                <div class="mt-6 border-t border-rose-200/20"></div>

                {% if form.non_field_errors %}
                    <div class="mt-5 rounded-lg bg-red-500/15 border border-red-300/30 px-4 py-3 text-sm text-red-100">
                        {{ form.non_field_errors }}
                    </div>
                {% endif %}

                <form method="post" class="mt-6 space-y-5">
                    {% csrf_token %}
                    <div>
                        <label for="id_email" class="block text-sm font-semibold text-white">Email</label>
                        <div class="mt-2 relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 9v.906a2.25 2.25 0 0 1-1.183 1.981l-6.75 3.75a2.25 2.25 0 0 1-2.134 0l-6.75-3.75A2.25 2.25 0 0 1 3.75 9.906V9m18 0V7.5A2.25 2.25 0 0 0 19.5 5.25h-15A2.25 2.25 0 0 0 2.25 7.5V9m19.5 0-8.598 4.776a2.25 2.25 0 0 1-2.304 0L2.25 9"/></svg>
                            </span>
                            <input type="email" name="email" id="id_email" value="{{ form.email.value|default:'' }}" placeholder="name@company.com" required class="w-full rounded-lg border border-white/25 bg-white/95 pl-11 pr-3 py-3 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:border-cyan-300">
                        </div>
                    </div>

                    <div>
                        <label for="id_password" class="block text-sm font-semibold text-white">Password</label>
                        <div class="mt-2 relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 0h10.5A2.25 2.25 0 0 1 19.5 12.75v6A2.25 2.25 0 0 1 17.25 21h-10.5A2.25 2.25 0 0 1 4.5 18.75v-6A2.25 2.25 0 0 1 6.75 10.5Z"/></svg>
                            </span>
                            <input type="password" name="password" id="id_password" placeholder="••••••••" required class="w-full rounded-lg border border-white/25 bg-white/95 pl-11 pr-3 py-3 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-cyan-300 focus:border-cyan-300">
                        </div>
                    </div>

                    <div class="flex items-center justify-between">
                        <label class="inline-flex items-center gap-2 text-sm text-white">
                            <input type="checkbox" name="remember_me" class="h-4 w-4 rounded border-white/40 text-cyan-500 focus:ring-cyan-300">
                            Remember me
                        </label>
                        <a href="/account/password/reset/" class="text-sm text-cyan-300 hover:text-cyan-200">Forgot password?</a>
                    </div>

                    <button type="submit" class="w-full rounded-lg bg-sky-500 py-3 text-lg font-semibold text-white hover:bg-sky-600 focus:outline-none focus:ring-2 focus:ring-cyan-300">Sign in</button>
                </form>
            </div>

            <div class="bg-indigo-950/70 px-8 py-4 text-center border-t border-rose-200/20">
                <p class="text-xs text-rose-100">ASFMS v1.0 © AFRILOTT Fleet Management</p>
            </div>
        </div>
    </div>
</body>
</html>
